name: Deploy Backend to Elastic Beanstalk

on:
  push:
    branches:
      - main
      - preview/*
      - feature/*
      - copilot/*
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::758955049569:role/GitHubBackendDeployRole
          aws-region: ap-southeast-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install EB CLI
        run: pip install awsebcli

      - name: Determine EB environment name
        id: env
        run: |
          BRANCH="${GITHUB_REF_NAME//\//-}"
          if [ "$BRANCH" = "main" ]; then
            echo "env_name=parkcast-api-env" >> $GITHUB_OUTPUT
          else
            echo "env_name=preview-${BRANCH}" >> $GITHUB_OUTPUT
          fi

      - name: Initialize EB
        run: |
          eb init parkcast-api \
            --platform "Docker" \
            --region ap-southeast-1

      - name: Create environment if missing
        run: |
          ENV_NAME="${{ steps.env.outputs.env_name }}"
          if ! eb list | grep -q "$ENV_NAME"; then
            eb create "$ENV_NAME" --single --instance_type t3.micro
          fi

      - name: Deploy to Elastic Beanstalk
        run: |
          eb deploy "${{ steps.env.outputs.env_name }}"
